<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Controle de Gastos</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<body class="bg-gray-900 text-white">

<!-- MENU -->
<div id="sidebar" class="fixed left-[-260px] top-0 w-64 h-full bg-gray-800 p-4 transition-all z-50">
  <h2 class="text-xl mb-4">Menu</h2>

  <button onclick="login()" class="bg-green-600 w-full p-2 mb-2 rounded">Login</button>
  <button onclick="logout()" class="bg-gray-600 w-full p-2 mb-2 rounded">Sair</button>

  <input id="salary" type="number" placeholder="Salário"
    class="w-full p-2 mt-4 bg-gray-700 rounded">
</div>

<button onclick="toggleMenu()" class="fixed top-4 left-4 bg-blue-600 px-3 py-2 rounded">☰</button>

<div class="max-w-2xl mx-auto bg-gray-800 p-6 rounded mt-16">

<h1 class="text-xl mb-4">💰 Controle</h1>

<div id="app" style="display:none;">

<input id="desc" placeholder="Descrição" class="w-full p-2 mb-2 bg-gray-700 rounded">

<select id="category" onchange="toggleVendaFields()" class="w-full p-2 mb-2 bg-gray-700 rounded">
  <option>Conta</option>
  <option>Divida</option>
  <option>Outros</option>
  <option>Vendas</option>
</select>

<input id="value" type="number" placeholder="Valor" class="w-full p-2 mb-2 bg-gray-700 rounded">

<div id="vendaFields" class="hidden">
  <input id="valorProduto" type="number" placeholder="Produto" class="w-full p-2 mb-2 bg-gray-700 rounded">
  <input id="valorRecebido" type="number" placeholder="Recebido" oninput="calcularTroco()" class="w-full p-2 mb-2 bg-gray-700 rounded">

  <select id="pagamento" class="w-full p-2 mb-2 bg-gray-700 rounded">
    <option>Dinheiro</option>
    <option>Pix</option>
    <option>Débito</option>
    <option>Crédito</option>
  </select>

  <p>Troco: R$ <span id="troco">0.00</span></p>
</div>

<button onclick="addTransaction()" class="bg-blue-600 w-full p-2 rounded">Adicionar</button>

<ul id="list" class="mt-4"></ul>

</div>
</div>

<script>
// FIREBASE
firebase.initializeApp({
 apiKey: "AIzaSyDeXJ_uSeaLgPKRUA1nCV7UFwEzpmiOmHc",
  authDomain: "meu-controle-financeiro-a0572.firebaseapp.com",
  projectId: "meu-controle-financeiro-a0572",
});

const auth = firebase.auth();
const db = firebase.firestore();

let userId=null;
let transactions=[];

// LOGIN
function login(){
  const provider=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}
function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(user=>{
  if(user){
    userId=user.uid;
    document.getElementById("app").style.display="block";
    loadData();
  }
});

// MENU
function toggleMenu(){
  const el=document.getElementById("sidebar");
  el.style.left= el.style.left==="0px" ? "-260px":"0px";
}

// VENDAS
function toggleVendaFields(){
  const cat=document.getElementById("category").value;
  document.getElementById("vendaFields").classList.toggle("hidden",cat!=="Vendas");
}

// TROCO CORRETO
function calcularTroco(){
  const p=Math.round((parseFloat(valorProduto.value)||0)*100);
  const r=Math.round((parseFloat(valorRecebido.value)||0)*100);
  troco.innerText=((r-p)/100).toFixed(2);
}

// ADD
function addTransaction(){
  const desc=descInput();
  const cat=category.value;

  if(cat==="Vendas"){
    const produto=Math.round(valorProduto.value*100);
    const pagamento=document.getElementById("pagamento").value;

    transactions.push({
      desc,
      category:cat,
      valorProduto:produto,
      pagamento
    });
  } else {
    const val=parseFloat(value.value);
    transactions.push({desc,category:cat,value:val});
  }

  updateUI();
}

// UI
function updateUI(){
  const list=document.getElementById("list");
  list.innerHTML="";

  transactions.forEach((t,i)=>{
    const li=document.createElement("li");
    li.className="flex justify-between bg-gray-700 p-2 mt-1";

    if(t.category==="Vendas"){
      li.innerHTML=`
        ${t.desc} - R$ ${(t.valorProduto/100).toFixed(2)}
        <span>${t.pagamento}</span>
      `;
    } else {
      li.innerHTML=`
        ${t.desc} - R$ ${t.value}
      `;
    }

    list.appendChild(li);
  });

  saveData();
}

// FIREBASE
async function loadData(){
  const doc=await db.collection("users").doc(userId).get();
  if(doc.exists){
    transactions=doc.data().transactions||[];
  }
  updateUI();
}

async function saveData(){
  await db.collection("users").doc(userId).set({transactions});
}

function descInput(){
  return document.getElementById("desc").value;
}
</script>

</body>
</html>
