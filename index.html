<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle Financeiro</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<body class="bg-gray-900 text-white">

<!-- OVERLAY -->
<div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black bg-opacity-50 hidden z-40"></div>

<!-- MENU -->
<div id="sidebar" class="fixed -left-64 top-0 w-72 h-full bg-gray-800 p-4 transition-all duration-300 z-50 overflow-y-auto">

  <h2 class="text-xl mb-4">Menu</h2>

<div id="userArea">

  <button id="btnLogin" onclick="login()" 
    class="bg-green-600 w-full p-2 mb-2 rounded">
    Login
  </button>

  <div id="userInfo" class="hidden">
    <p class="mb-2">👤 <span id="userName"></span></p>

    <button onclick="logout()" 
      class="bg-gray-600 w-full p-2 mb-2 rounded">
      Sair
    </button>
  </div>

</div>
  
  <hr class="mb-4">

  <h3 class="font-bold mb-2">📅 Histórico</h3>

  <input type="date" id="filtroData"
    class="bg-gray-700 p-2 rounded mb-3 w-full"
    onchange="filtrarPorData()">

  <div id="historico"></div>

  <hr class="my-4">

  <h3 class="font-bold mb-2">💰 Caixa</h3>

  <p>Troco inicial:</p>
  <input id="trocoInicial" class="w-full p-2 bg-gray-700 mb-2">

  <p>Troco final:</p>
  <input id="trocoFinal" class="w-full p-2 bg-gray-700 mb-2">

  <p>Diferença: R$ <span id="diferenca">0</span></p>

  <hr class="my-4">

  <h3 class="font-bold mb-2">📊 Resumo</h3>

  <p>💵 Dinheiro: R$ <span id="resDinheiro">0</span></p>
  <p>💳 Débito: R$ <span id="resDebito">0</span></p>
  <p>💳 Crédito: R$ <span id="resCredito">0</span></p>
  <p>📱 Pix: R$ <span id="resPix">0</span></p>

</div>

<button onclick="toggleMenu()" class="fixed top-4 left-4 bg-blue-600 px-3 py-2 rounded z-50">☰</button>

<!-- APP -->
<div class="max-w-2xl mx-auto bg-gray-800 p-6 rounded mt-16">

<h1 class="text-xl mb-4">💰 Controle</h1>

<div id="app" style="display:none;">

<input id="desc" placeholder="Descrição" class="w-full p-2 mb-2 bg-gray-700 rounded">

<select id="categoria" onchange="toggleVenda()" class="w-full p-2 mb-2 bg-gray-700 rounded">
  <option>Conta</option>
  <option>Divida</option>
  <option>Outros</option>
  <option>Vendas</option>
</select>

<input id="valor" type="number" placeholder="Valor" class="w-full p-2 mb-2 bg-gray-700 rounded">

<div id="vendasBox" class="hidden">
  <input id="valorProduto" type="number" placeholder="Valor produto" class="w-full p-2 mb-2 bg-gray-700 rounded">
  <input id="valorRecebido" type="number" placeholder="Valor recebido" oninput="calcTroco()" class="w-full p-2 mb-2 bg-gray-700 rounded">

  <select id="pagamento" class="w-full p-2 mb-2 bg-gray-700 rounded">
    <option>Dinheiro</option>
    <option>Débito</option>
    <option>Crédito</option>
    <option>Pix</option>
  </select>

  <p>Troco: R$ <span id="troco">0.00</span></p>
</div>

<button onclick="add()" class="bg-blue-600 w-full p-2 rounded">Adicionar</button>

<ul id="lista" class="mt-4"></ul>

</div>
</div>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDeXJ_uSeaLgPKRUA1nCV7UFwEzpmiOmHc",
  authDomain: "meu-controle-financeiro-a0572.firebaseapp.com",
  projectId: "meu-controle-financeiro-a0572",
  storageBucket: "meu-controle-financeiro-a0572.firebasestorage.app",
  messagingSenderId: "202199536593",
  appId: "1:202199536593:web:5ec609a43788066886c6f0"
};

const auth = firebase.auth();
const db = firebase.firestore();

let userId = null;
let dados = [];
let userName = "";

// MENU
function toggleMenu(){
  const menu = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");

  if(menu.classList.contains("left-0")){
    menu.classList.remove("left-0");
    menu.classList.add("-left-64");
    overlay.classList.add("hidden");
  } else {
    menu.classList.remove("-left-64");
    menu.classList.add("left-0");
    overlay.classList.remove("hidden");
  }
}

// LOGIN
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(result => {
      console.log("Login realizado:", result.user);
    })
    .catch(error => {
      console.error("Erro no login:", error);
      alert("Erro ao fazer login: " + error.message);
    });
}
// LOGOUT
function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(async user=>{
  if(user){
    userId = user.uid;
    document.getElementById("app").style.display="block";

    await loadUserName();
    load();
  } else {
    document.getElementById("btnLogin").style.display = "block";
    document.getElementById("userInfo").classList.add("hidden");
  }
});
  
// TROCO
function calcTroco(){
  const p = Math.round((parseFloat(valorProduto.value)||0)*100);
  const r = Math.round((parseFloat(valorRecebido.value)||0)*100);
  troco.innerText = ((r-p)/100).toFixed(2);
}

// VENDAS
function toggleVenda(){
  vendasBox.classList.toggle("hidden", categoria.value!=="Vendas");
}

// ADD
function add(){
  const desc = document.getElementById("desc").value;
  if(!desc) return alert("Digite a descrição");

  const hoje = new Date().toISOString().split("T")[0];

  if(categoria.value==="Vendas"){
    dados.push({
      desc,
      categoria:"Vendas",
      valorProduto: Math.round(valorProduto.value*100),
      pagamento: pagamento.value,
      data: hoje
    });
  } else {
    dados.push({
      desc,
      categoria: categoria.value,
      valor: parseFloat(valor.value) || 0,
      data: hoje
    });
  }

  salvar();
  atualizar();
}

// UI
function atualizar(){
  const lista = document.getElementById("lista");
  lista.innerHTML="";

  let dinheiro=0, debito=0, credito=0, pix=0;

  dados.forEach((d, i)=>{
    const li=document.createElement("li");
    li.className="bg-gray-700 p-2 mt-1 flex justify-between";

    if(d.categoria==="Vendas"){
      li.innerHTML = `${d.desc} - R$ ${(d.valorProduto/100).toFixed(2)} <span>${d.pagamento}</span>`;

      if(d.pagamento==="Dinheiro") dinheiro+=d.valorProduto;
      if(d.pagamento==="Débito") debito+=d.valorProduto;
      if(d.pagamento==="Crédito") credito+=d.valorProduto;
      if(d.pagamento==="Pix") pix+=d.valorProduto;

    } else {
      li.innerHTML = `${d.desc} - R$ ${d.valor.toFixed(2)}`;
    }

    lista.appendChild(li);
  });

  resDinheiro.innerText=(dinheiro/100).toFixed(2);
  resDebito.innerText=(debito/100).toFixed(2);
  resCredito.innerText=(credito/100).toFixed(2);
  resPix.innerText=(pix/100).toFixed(2);

  atualizarHistorico();
}
// NAME
  async function loadUserName(){
  const ref = db.collection("users").doc(userId);
  const doc = await ref.get();

  if(doc.exists && doc.data().nome){
    userName = doc.data().nome;
  } else {
    userName = prompt("Digite seu nome:");
    await ref.set({ nome: userName }, { merge: true });
  }

  document.getElementById("userName").innerText = userName;

  // UI
  document.getElementById("btnLogin").style.display = "none";
  document.getElementById("userInfo").classList.remove("hidden");
}
// HISTÓRICO
function atualizarHistorico(){
  const dataFiltro = document.getElementById("filtroData").value;
  const historico = document.getElementById("historico");

  historico.innerHTML="";

  if(!dataFiltro) return;

  const filtrados = dados.filter(d => d.data === dataFiltro);

  let dinheiroDia = 0;

  filtrados.forEach(d=>{
    const item=document.createElement("div");
    item.className="bg-gray-700 p-2 mb-1 rounded";

    if(d.categoria==="Vendas"){
      item.innerHTML = `${d.desc} - R$ ${(d.valorProduto/100).toFixed(2)} (${d.pagamento})`;
      if(d.pagamento==="Dinheiro") dinheiroDia+=d.valorProduto;
    } else {
      item.innerText = `${d.desc} - R$ ${d.valor.toFixed(2)}`;
    }

    historico.appendChild(item);
  });

  const inicial = parseFloat(trocoInicial.value)||0;
  const final = parseFloat(trocoFinal.value)||0;

  const esperado = inicial + (dinheiroDia/100);
  const diferencaValor = final - esperado;

  diferenca.innerText = diferencaValor.toFixed(2);
}
  // REMOVER
function remover(i){
  if(i < 0 || i >= dados.length) return;

  const confirmar = confirm("Deseja excluir essa venda?");
  if(!confirmar) return;

  dados.splice(i,1);

  salvar();
  atualizar();
}
// FIREBASE
async function load(){
  const doc = await db.collection("users").doc(userId).get();
  if(doc.exists){
    dados = doc.data().dados || [];
  }
  atualizar();
}

async function salvar(){
  await db.collection("users").doc(userId).set({
    dados,
    nome: userName
  });
}

// INIT DATA
const hoje = new Date().toISOString().split("T")[0];
document.getElementById("filtroData").value = hoje;
</script>

</body>
</html>
