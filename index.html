<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle Financeiro</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<body class="bg-gray-900 text-white">

<div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black bg-opacity-50 hidden z-40"></div>

<div id="sidebar" class="fixed -left-64 top-0 w-72 h-full bg-gray-800 p-4 transition-all duration-300 z-50 overflow-y-auto">

  <h2 class="text-xl mb-4">Menu</h2>

  <div id="userArea">

    <button id="btnLogin" onclick="login()" class="bg-green-600 w-full p-2 mb-2 rounded">
      Login
    </button>

    <div id="userInfo" class="hidden">
      <p class="mb-2">👤 <span id="userName"></span></p>

      <button onclick="logout()" class="bg-gray-600 w-full p-2 mb-2 rounded">
        Sair
      </button>
    </div>

  </div>

  <hr class="mb-4">

  <h3 class="font-bold mb-2">📅 Histórico</h3>

  <input type="date" id="filtroData"
    class="bg-gray-700 p-2 rounded mb-3 w-full"
    onchange="filtrarPorData()">

  <div id="historico"></div>

  <hr class="my-4">

  <h3 class="font-bold mb-2">💰 Caixa</h3>

  <p>Troco inicial:</p>
  <input id="trocoInicial" class="w-full p-2 bg-gray-700 mb-2">

  <p>Troco final:</p>
  <input id="trocoFinal" class="w-full p-2 bg-gray-700 mb-2">

  <p>Diferença: R$ <span id="diferenca">0</span></p>

  <hr class="my-4">

  <h3 class="font-bold mb-2">📊 Resumo</h3>

  <p>💵 Dinheiro: R$ <span id="resDinheiro">0</span></p>
  <p>💳 Débito: R$ <span id="resDebito">0</span></p>
  <p>💳 Crédito: R$ <span id="resCredito">0</span></p>
  <p>📱 Pix: R$ <span id="resPix">0</span></p>

</div>

<button onclick="toggleMenu()" class="fixed top-4 left-4 bg-blue-600 px-3 py-2 rounded z-50">☰</button>

<div class="max-w-2xl mx-auto bg-gray-800 p-6 rounded mt-16">

<h1 class="text-xl mb-4">💰 Controle</h1>

<div id="app" style="display:none;">

<input id="desc" placeholder="Descrição" class="w-full p-2 mb-2 bg-gray-700 rounded">

<select id="categoria" onchange="toggleVenda()" class="w-full p-2 mb-2 bg-gray-700 rounded">
  <option>Conta</option>
  <option>Divida</option>
  <option>Outros</option>
  <option>Vendas</option>
</select>

<input id="valor" type="number" placeholder="Valor" class="w-full p-2 mb-2 bg-gray-700 rounded">

<div id="vendasBox" class="hidden">
  <input id="valorProduto" type="number" placeholder="Valor produto" class="w-full p-2 mb-2 bg-gray-700 rounded">
  <input id="valorRecebido" type="number" placeholder="Valor recebido" oninput="calcTroco()" class="w-full p-2 mb-2 bg-gray-700 rounded">

  <select id="pagamento" class="w-full p-2 mb-2 bg-gray-700 rounded">
    <option>Dinheiro</option>
    <option>Débito</option>
    <option>Crédito</option>
    <option>Pix</option>
  </select>

  <p>Troco: R$ <span id="troco">0.00</span></p>
</div>

<button onclick="add()" class="bg-blue-600 w-full p-2 rounded">Adicionar</button>

<ul id="lista" class="mt-4"></ul>

</div>
</div>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDeXJ_uSeaLgPKRUA1nCV7UFwEzpmiOmHc",
  authDomain: "meu-controle-financeiro-a0572.firebaseapp.com",
  projectId: "meu-controle-financeiro-a0572",
  storageBucket: "meu-controle-financeiro-a0572.firebasestorage.app",
  messagingSenderId: "202199536593",
  appId: "1:202199536593:web:5ec609a43788066886c6f0"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let userId = null;
let dados = [];
let userName = "";

function el(id){
  return document.getElementById(id);
}

function toggleMenu(){
  const menu = el("sidebar");
  const overlay = el("overlay");

  if(menu.classList.contains("left-0")){
    menu.classList.remove("left-0");
    menu.classList.add("-left-64");
    overlay.classList.add("hidden");
  } else {
    menu.classList.remove("-left-64");
    menu.classList.add("left-0");
    overlay.classList.remove("hidden");
  }
}

function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(e => alert(e.message));
}

function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(async user => {
  if(user){
    userId = user.uid;
    el("app").style.display = "block";
    el("btnLogin").style.display = "none";
    el("userInfo").classList.remove("hidden");
    await loadUserName();
    load();
  } else {
    el("app").style.display = "none";
    el("btnLogin").style.display = "block";
    el("userInfo").classList.add("hidden");
  }
});

function calcTroco(){
  const p = Math.round((parseFloat(el("valorProduto")?.value)||0)*100);
  const r = Math.round((parseFloat(el("valorRecebido")?.value)||0)*100);
  el("troco").innerText = ((r-p)/100).toFixed(2);
}

function toggleVenda(){
  el("vendasBox").classList.toggle("hidden", el("categoria").value !== "Vendas");
}

function add(){
  const desc = el("desc").value;
  if(!desc) return alert("Digite a descrição");

  const hoje = new Date().toISOString().split("T")[0];

  if(el("categoria").value === "Vendas"){
    dados.push({
      desc,
      categoria:"Vendas",
      valorProduto: Math.round((parseFloat(el("valorProduto").value)||0)*100),
      pagamento: el("pagamento").value,
      data: hoje
    });

  } else if(el("categoria").value === "Divida"){
    dados.push({
      desc,
      categoria:"Divida",
      valor:-Math.abs(parseFloat(el("valor").value)||0),
      status:"pendente",
      data: hoje
    });

  } else {
    dados.push({
      desc,
      categoria: el("categoria").value,
      valor: parseFloat(el("valor").value)||0,
      data: hoje
    });
  }

  salvar();
  atualizar();
}

function atualizar(){
  const lista = el("lista");
  lista.innerHTML = "";

  let dinheiro=0, debito=0, credito=0, pix=0;

  dados.forEach((d,i)=>{

    const li = document.createElement("li");
    li.className = "bg-gray-700 p-2 mt-1 flex justify-between";

    if(d.categoria === "Vendas"){

      const valor = d.valorProduto || 0;

      if(d.pagamento === "Dinheiro") dinheiro += valor;
      if(d.pagamento === "Débito") debito += valor;
      if(d.pagamento === "Crédito") credito += valor;
      if(d.pagamento === "Pix") pix += valor;

      li.innerHTML = `
        <div>
          ${d.desc} - R$ ${(valor/100).toFixed(2)} <span>${d.pagamento}</span>
        </div>

        <div>
          <button onclick="editarVenda(${i})" class="px-2 py-1 bg-yellow-500 rounded text-xs">Editar</button>
          <button onclick="remover(${i})" class="px-2 py-1 bg-red-500 rounded text-xs">Excluir</button>
        </div>
      `;

    } else {

      li.innerHTML = `
        <div>
          ${d.desc} - R$ ${(d.valor||0).toFixed(2)}
        </div>

        <div>
          ${
            d.categoria === "Divida"
            ? `<button onclick="toggleDivida(${i})"
              class="px-2 py-1 rounded text-xs ${d.status==="pendente"?"bg-red-500":"bg-green-500"}">
              ${d.status}
            </button>`
            : ""
          }

          <button onclick="remover(${i})">❌</button>
        </div>
      `;
    }

    lista.appendChild(li);
  });

  el("resDinheiro").innerText = (dinheiro/100).toFixed(2);
  el("resDebito").innerText = (debito/100).toFixed(2);
  el("resCredito").innerText = (credito/100).toFixed(2);
  el("resPix").innerText = (pix/100).toFixed(2);
}

function editarVenda(i){
  const v = dados[i];

  const novoDesc = prompt("Descrição:", v.desc);
  if(!novoDesc) return;

  const novoValor = prompt("Valor do produto (ex: 10.50):", (v.valorProduto/100).toFixed(2));
  if(!novoValor) return;

  const novoPagamento = prompt("Pagamento (Dinheiro, Débito, Crédito, Pix):", v.pagamento);
  if(!novoPagamento) return;

  dados[i] = {
    ...v,
    desc: novoDesc,
    valorProduto: Math.round(parseFloat(novoValor)*100),
    pagamento: novoPagamento
  };

  salvar();
  atualizar();
}
  
function toggleDivida(i){
  dados[i].status = dados[i].status === "pendente" ? "pago" : "pendente";
  salvar();
  atualizar();
}

function remover(i){
  dados.splice(i,1);
  salvar();
  atualizar();
}

async function load(){
  const doc = await db.collection("users").doc(userId).get();
  if(doc.exists) dados = doc.data().dados || [];
  atualizar();
}

async function salvar(){
  await db.collection("users").doc(userId).set({ dados, nome: userName });
}

async function loadUserName(){
  const ref = db.collection("users").doc(userId);
  const doc = await ref.get();

  if(doc.exists && doc.data().nome){
    userName = doc.data().nome;
  } else {
    userName = prompt("Digite seu nome:");
    await ref.set({ nome:userName }, { merge:true });
  }

  el("userName").innerText = userName;
}

const hoje = new Date().toISOString().split("T")[0];
if(el("filtroData")) el("filtroData").value = hoje;

</script>

</body>
</html>
