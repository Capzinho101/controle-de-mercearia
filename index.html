<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDeXJ_uSeaLgPKRUA1nCV7UFwEzpmiOmHc",
  authDomain: "meu-controle-financeiro-a0572.firebaseapp.com",
  projectId: "meu-controle-financeiro-a0572",
  storageBucket: "meu-controle-financeiro-a0572.firebasestorage.app",
  messagingSenderId: "202199536593",
  appId: "1:202199536593:web:5ec609a43788066886c6f0"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let userId = null;
let dados = [];
let userName = "";

// ELEMENTOS (CORREÇÃO PRINCIPAL)
let categoria, valor, valorProduto, valorRecebido, pagamento, troco, diferenca, trocoInicial, trocoFinal;

// INICIALIZAÇÃO SEGURA
document.addEventListener("DOMContentLoaded", () => {

  categoria = document.getElementById("categoria");
  valor = document.getElementById("valor");
  valorProduto = document.getElementById("valorProduto");
  valorRecebido = document.getElementById("valorRecebido");
  pagamento = document.getElementById("pagamento");
  troco = document.getElementById("troco");
  diferenca = document.getElementById("diferenca");
  trocoInicial = document.getElementById("trocoInicial");
  trocoFinal = document.getElementById("trocoFinal");

});

// MENU
function toggleMenu(){
  const menu = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");

  if(menu.classList.contains("left-0")){
    menu.classList.remove("left-0");
    menu.classList.add("-left-64");
    overlay.classList.add("hidden");
  } else {
    menu.classList.remove("-left-64");
    menu.classList.add("left-0");
    overlay.classList.remove("hidden");
  }
}

// LOGIN
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(result => console.log("Login:", result.user))
    .catch(error => alert(error.message));
}

function logout(){
  auth.signOut();
}

// AUTH
auth.onAuthStateChanged(async user => {
  if(user){
    userId = user.uid;
    document.getElementById("app").style.display = "block";
    await loadUserName();
    load();
  } else {
    document.getElementById("app").style.display = "none";
  }
});

// TROCO
function calcTroco(){
  const p = Math.round((parseFloat(valorProduto?.value)||0)*100);
  const r = Math.round((parseFloat(valorRecebido?.value)||0)*100);
  troco.innerText = ((r-p)/100).toFixed(2);
}

// VENDAS
function toggleVenda(){
  document.getElementById("vendasBox")
    .classList.toggle("hidden", categoria.value !== "Vendas");
}

// ADD
function add(){
  const desc = document.getElementById("desc").value;
  if(!desc) return alert("Digite a descrição");

  const hoje = new Date().toISOString().split("T")[0];

  if(categoria.value === "Vendas"){
    dados.push({
      desc,
      categoria: "Vendas",
      valorProduto: Math.round((parseFloat(valorProduto.value)||0)*100),
      pagamento: pagamento.value,
      data: hoje
    });

  } else if(categoria.value === "Divida"){
    dados.push({
      desc,
      categoria: "Divida",
      valor: -Math.abs(parseFloat(valor.value)||0),
      status: "pendente",
      data: hoje
    });

  } else {
    dados.push({
      desc,
      categoria: categoria.value,
      valor: parseFloat(valor.value)||0,
      data: hoje
    });
  }

  salvar();
  atualizar();
}

// UI
function atualizar(){
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  let dinheiro = 0, debito = 0, credito = 0, pix = 0;

  dados.forEach((d,i)=>{

    const li = document.createElement("li");
    li.className = "bg-gray-700 p-2 mt-1 flex justify-between";

    if(d.categoria === "Vendas"){

      li.innerHTML = `
        ${d.desc} - R$ ${(d.valorProduto/100||0).toFixed(2)} <span>${d.pagamento}</span>
      `;

      dinheiro += (d.valorProduto||0);
      debito += (d.valorProduto||0);
      credito += (d.valorProduto||0);
      pix += (d.valorProduto||0);

    } else {

      li.innerHTML = `
        <div>
          ${
            d.categoria === "Divida"
            ? `${d.desc} - R$ ${Math.abs(d.valor||0).toFixed(2)}`
            : `${d.desc} - R$ ${(d.valor||0).toFixed(2)}`
          }
        </div>

        <div>
          ${
            d.categoria === "Divida"
            ? `<button onclick="toggleDivida(${i})"
              class="px-2 py-1 rounded text-xs ${d.status==="pendente"?"bg-red-500":"bg-green-500"}">
              ${d.status}
            </button>`
            : ""
          }

          <button onclick="remover(${i})">❌</button>
        </div>
      `;
    }

    lista.appendChild(li);
  });

  document.getElementById("resDinheiro").innerText = (dinheiro/100).toFixed(2);
  document.getElementById("resDebito").innerText = (debito/100).toFixed(2);
  document.getElementById("resCredito").innerText = (credito/100).toFixed(2);
  document.getElementById("resPix").innerText = (pix/100).toFixed(2);

  atualizarHistorico();
}

// DIVIDA
function toggleDivida(i){
  const item = dados[i];
  item.status = item.status === "pendente" ? "pago" : "pendente";
  salvar();
  atualizar();
}

// FIRESTORE
async function load(){
  const doc = await db.collection("users").doc(userId).get();
  if(doc.exists) dados = doc.data().dados || [];
  atualizar();
}

async function salvar(){
  await db.collection("users").doc(userId).set({ dados, nome: userName });
}

// HISTÓRICO
function atualizarHistorico(){
  const dataFiltro = document.getElementById("filtroData").value;
  const historico = document.getElementById("historico");

  historico.innerHTML = "";

  if(!dataFiltro) return;

  const filtrados = dados.filter(d=>d.data===dataFiltro);

  let dinheiroDia = 0;

  filtrados.forEach(d=>{
    const item = document.createElement("div");
    item.className = "bg-gray-700 p-2 mb-1 rounded";

    if(d.categoria==="Vendas"){
      item.innerHTML = `${d.desc} - R$ ${(d.valorProduto/100).toFixed(2)} (${d.pagamento})`;
      if(d.pagamento==="Dinheiro") dinheiroDia += d.valorProduto;
    } else {
      item.innerText = `${d.desc} - R$ ${(d.valor||0).toFixed(2)}`;
    }

    historico.appendChild(item);
  });

  const inicial = parseFloat(trocoInicial.value)||0;
  const final = parseFloat(trocoFinal.value)||0;

  diferenca.innerText = (final - (inicial + dinheiroDia/100)).toFixed(2);
}

// USER
async function loadUserName(){
  const ref = db.collection("users").doc(userId);
  const doc = await ref.get();

  if(doc.exists && doc.data().nome){
    userName = doc.data().nome;
  } else {
    userName = prompt("Digite seu nome:");
    await ref.set({ nome: userName }, { merge:true });
  }

  document.getElementById("userName").innerText = userName;
}
</script>
